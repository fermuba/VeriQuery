name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - feature/multi-db-supabase
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_DEBUG: false
          VITE_AZURE_CLIENT_ID: 6aafe3c0-8461-4f73-95ac-c0715f50ee40
          VITE_AZURE_TENANT_ID: f53e7656-1a12-45c1-88f3-8cc6366854cf
          VITE_AZURE_REDIRECT_URI: https://witty-flower-090c49e10.4.azurestaticapps.net/callback
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend/dist'
          skip_app_build: true

      - name: Post deployment info
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "App URL will be available at the Azure Static Web Apps URL"
